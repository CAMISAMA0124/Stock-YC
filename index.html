<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>風控 YC — 智慧財金系統</title>
  <meta name="description" content="智慧財金風控系統 — 股票溫度監測、現金配置建議、AI持倉分析">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="index.css?v=6">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="shortcut icon" href="icon.png">
  <meta name="theme-color" content="#080812">
  <link rel="apple-touch-icon" href="icon.png">
</head>

<body>
  <!-- Silent SW and Cache Clearing to prevent cached code mismatch -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(registrations => {
        registrations.forEach(r => r.unregister());
      }).catch(err => console.warn('SW unregister failed:', err));
    }
    if (window.caches) {
      caches.keys().then(keys => {
        keys.forEach(k => caches.delete(k));
      });
    }
  </script>
  <div id="app">

    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-logo">
        <div class="loading-icon">⚡</div>
        <div class="loading-title">風控 YC</div>
        <div class="loading-subtitle">智慧財金系統</div>
        <div class="loading-bar">
          <div class="loading-progress" id="loading-progress"></div>
        </div>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden">

      <!-- Header -->
      <header class="app-header">
        <div class="header-left">
          <span class="header-logo">⚡ YC</span>
        </div>
        <div class="header-center">
          <span id="header-title">市場總覽</span>
        </div>
        <div class="header-right">
          <button class="btn-icon" id="btn-refresh" title="刷新數據">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
          </button>
          <div class="data-status" id="data-status">
            <span class="status-dot" id="status-dot"></span>
            <span class="status-text" id="status-text">載入中</span>
          </div>
        </div>
      </header>

      <!-- Page Container -->
      <main class="page-container" id="page-container">
        <div id="page-dashboard" class="page active"></div>
        <div id="page-stocks" class="page"></div>
        <div id="page-heatmap" class="page"></div>
        <div id="page-ai" class="page"></div>
        <div id="page-settings" class="page"></div>
        <div id="page-ledger" class="page"></div>
      </main>

      <!-- Bottom Navigation -->
      <nav class="bottom-nav">
        <button class="nav-item active" data-page="dashboard" id="nav-dashboard">
          <div class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1"></rect>
              <rect x="14" y="3" width="7" height="7" rx="1"></rect>
              <rect x="14" y="14" width="7" height="7" rx="1"></rect>
              <rect x="3" y="14" width="7" height="7" rx="1"></rect>
            </svg>
          </div>
          <span class="nav-label">總覽</span>
        </button>
        <button class="nav-item" data-page="stocks" id="nav-stocks">
          <div class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
              <polyline points="16 7 22 7 22 13"></polyline>
            </svg>
          </div>
          <span class="nav-label">股票</span>
        </button>
        <button class="nav-item" data-page="heatmap" id="nav-heatmap">
          <div class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="18" height="18" rx="2"></rect>
              <line x1="9" y1="3" x2="9" y2="21"></line>
              <line x1="15" y1="3" x2="15" y2="21"></line>
              <line x1="3" y1="9" x2="21" y2="9"></line>
              <line x1="3" y1="15" x2="21" y2="15"></line>
            </svg>
          </div>
          <span class="nav-label">熱力圖</span>
        </button>
        <button class="nav-item" data-page="ai" id="nav-ai">
          <div class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2a10 10 0 1 0 10 10"></path>
              <path d="M22 2L12 12"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </div>
          <span class="nav-label">AI分析</span>
        </button>
        <button class="nav-item" data-page="settings" id="nav-settings">
          <div class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
              </path>
            </svg>
          </div>
          <span class="nav-label">設定</span>
        </button>
        <button class="nav-item" data-page="ledger" id="nav-ledger">
          <div class="nav-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2"></rect>
              <polyline points="8 21 12 17 16 21"></polyline>
              <line x1="12" y1="17" x2="12" y2="3"></line>
              <line x1="7" y1="8" x2="17" y2="8"></line>
              <line x1="7" y1="12" x2="12" y2="12"></line>
            </svg>
          </div>
          <span class="nav-label">記帳</span>
        </button>
      </nav>

    </div><!-- end #main-app -->
  </div><!-- end #app -->

  <!-- Scripts — order is important -->
  <script src="js/state.js?v=11"></script>
  <script src="js/data/api.js?v=11"></script>
  <script src="js/data/indicators.js?v=11"></script>
  <script src="js/data/sentiment.js?v=11"></script>
  <script src="js/data/portfolio.js?v=11"></script>
  <script src="js/data/metals.js?v=12"></script>
  <script src="js/modules/temperature.js?v=12"></script>
  <script src="js/modules/heatmap.js?v=12"></script>
  <script src="js/modules/allocation.js?v=12"></script>
  <script src="js/modules/ai-analysis.js?v=12"></script>
  <script src="js/modules/charting.js?v=12"></script>
  <script src="js/pages/dashboard.js?v=12"></script>
  <script src="js/pages/stocks.js?v=12"></script>
  <script src="js/pages/heatmap-page.js?v=12"></script>
  <script src="js/pages/ai-page.js?v=12"></script>
  <script src="js/pages/settings.js?v=12"></script>
  <script src="js/pages/ledger.js?v=12"></script>
  <script src="js/app.js?v=12"></script>
</body>

</html>
